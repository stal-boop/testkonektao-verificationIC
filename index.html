<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konektao Employment Verification</title>

  <style>
    body {
      margin: 0;
      font-family: Cambria, Cambria, Cambria;
      background: #f4f6f5;
      color: #24313f;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 40px 20px;
    }

    .logo {
      width: 130px;
      margin-bottom: 10px;
    }

    .company {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #1f2f46;
    }

    .title {
      color: #1e7f6f;
      letter-spacing: 2px;
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .line {
      width: 340px;
      max-width: 75%;
      height: 2px;
      background: #1e7f6f;
      margin: 10px auto 30px;
    }

    .card {
      background: #eef2f1;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .name {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #1f2f46;
    }

    .info-box {
      background: #f7f7f7;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      text-align: left;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      gap: 16px;
    }

    .label {
      font-weight: bold;
      color: #6b7280;
    }

    .value {
      text-align: right;
    }

    .status-box {
      border-radius: 10px;
      padding: 15px;
      text-align: left;
    }

    .status-header {
      display: flex;
      align-items: center;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 20px;
    }

    .status-icon {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      font-size: 14px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .status-active {
      background: #e6f4f1;
      border: 2px solid #1e7f6f;
      color: #1e7f6f;
    }

    .status-active .status-icon {
      background: #1e7f6f;
      color: white;
    }

    .status-inactive {
      background: #fdecea;
      border: 2px solid #c0392b;
      color: #c0392b;
    }

    .status-inactive .status-icon {
      background: #c0392b;
      color: white;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    .email {
      color: #1e7f6f;
      font-weight: bold;
      margin-top: 5px;
      font-size: 16px;
    }

    .error {
      background: #fdecea;
      padding: 20px;
      border-radius: 10px;
      color: #c0392b;
      font-weight: bold;
      max-width: 420px;
      margin: auto;
    }

    @media (max-width: 640px) {
      .container {
        padding: 28px 14px;
      }

      .company {
        font-size: 22px;
      }

      .name {
        font-size: 22px;
      }

      .row {
        flex-direction: column;
        align-items: flex-start;
      }

      .value {
        text-align: left;
      }

      .status-header {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png?v=4" class="logo" alt="Konektao Logo">
    <div class="company">Konektao LLC</div>

    <div class="title">EMPLOYMENT VERIFICATION</div>
    <div class="line"></div>

    <div id="content"></div>

    <div class="footer">
      For verification concerns, contact:
      <div class="email">hr@konektao.com</div>
    </div>
  </div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSmKTeufiEfTA4GpMI6_D6j7QjFjQnPLqb3en-EDr3edn-j1J4-Y_PCv9wNSLGY0-so6-igBcfFSDr1/pub?output=csv";

const params = new URLSearchParams(window.location.search);
const employeeID = (params.get("id") || "").trim().toLowerCase();

function renderNotFound(message = "Employee not found") {
  document.getElementById("content").innerHTML = `
    <div class="error">
      ${message}<br>
      <span style="font-weight: normal;">Please check the employee ID and try again.</span>
    </div>
  `;
}

function parseCSV(text) {
  return text
    .trim()
    .split("\n")
    .map(row => row.split(",").map(cell => cell.trim()));
}

function renderEmployee(emp) {
  const statusRaw = (emp[4] || "").toUpperCase().trim();

  let statusClass = "";
  let statusText = "";
  let icon = "";
  let message = "";

  if (statusRaw === "ACTIVE") {
    statusClass = "status-active";
    statusText = "ACTIVE";
    icon = "✓";
    message = "This employee is currently active with Konektao LLC.";
  } else {
    statusClass = "status-inactive";
    statusText = "INACTIVE";
    icon = "✕";
    message = "This employee ID is inactive and should not be considered a valid or current employment record with Konektao LLC.";
  }

  document.getElementById("content").innerHTML = `
    <div class="card">
      <div class="name">${emp[1]}</div>

      <div class="info-box">
        <div class="row">
          <div class="label">Employee ID:</div>
          <div class="value">${emp[0]}</div>
        </div>
        <div class="row">
          <div class="label">Position:</div>
          <div class="value">${emp[2]}</div>
        </div>
        <div class="row">
          <div class="label">Department:</div>
          <div class="value">${emp[3]}</div>
        </div>
      </div>

      <div class="status-box ${statusClass}">
        <div class="status-header">
          <div class="status-icon">${icon}</div>
          <div>STATUS: ${statusText}</div>
        </div>
        <div>${message}</div>
      </div>
    </div>
  `;
}

if (!employeeID) {
  renderNotFound("No employee ID provided");
} else {
  fetch(sheetURL)
    .then(res => res.text())
    .then(data => {
      const rows = parseCSV(data);
      const employees = rows.slice(1);

      const found = employees.find(
        e => ((e[0] || "").trim().toLowerCase()) === employeeID
      );

      if (!found) {
        renderNotFound();
        return;
      }

      renderEmployee(found);
    })
    .catch(() => renderNotFound("Unable to load employee data"));
}
</script>

</body>
</html>
